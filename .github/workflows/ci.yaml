name: CI

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    container:
      image: ghcr.io/${{ github.repository_owner }}/shunyakv-ci:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark repo as safe for git (container)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build + Test
        run: |
          rm -rf build
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_TESTS=ON \
            -DBUILD_SERVER=OFF
          cmake --build build -j 2
          ctest --test-dir build --output-on-failure --output-junit test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results.xml

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: CTest Results
          path: "build/test-results.xml"
          reporter: java-junit
