name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI docker image
        run: |
          docker build -f Dockerfile.ci -t shunyakv-ci.local:latest .

      - name: Build + Test (inside container)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/w" -w /w \
            shunyakv-ci.local:latest \
            bash -lc '
              rm -rf build &&
              cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DENABLE_TESTS=ON \
                -DBUILD_SERVER=OFF &&
              cmake --build build -j 2 &&
              ctest --test-dir build --output-on-failure
            '
