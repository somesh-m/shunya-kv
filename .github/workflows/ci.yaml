name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: read

    container:
      image: ghcr.io/${{ github.repository_owner }}/shunyakv-ci:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build + Test
        run: |
          rm -rf build
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_TESTS=ON \
            -DBUILD_SERVER=OFF
          cmake --build build -j 2
          ctest --test-dir build --output-on-failure
