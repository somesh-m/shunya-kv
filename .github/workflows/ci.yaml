name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # Fast lane: build tests only (no Seastar), run gtests on Ubuntu
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache CMake deps (googletest, etc.)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/googletest
            build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      - name: Configure (tests only)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SERVER=OFF \
            -DENABLE_TESTS=ON

      - name: Build
        run: cmake --build build -j

      - name: Run tests (ctest)
        run: ctest --test-dir build --output-on-failure

  # Optional: full build including server (needs Seastar & deps preinstalled)
  # You can enable later once you set up dependencies or containers.
  # full-build:
