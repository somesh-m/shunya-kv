# Network
# TCP port the server listens on. Also used as the advertised base port in
# node metadata and shard-info responses.
db_port=60111

# Sharding / hashing
# Reported in node metadata and shard-info responses. The runtime shard mapper
# is currently hardcoded to FNV-1a 64-bit, so changing this value does not yet
# switch the hash implementation.
hash="fnv1a64"

send_shard_details_on_connect=false

# EVICTION POLICY
# Defines the algorithm for the Sanctuary pool. Currently, this is
# hardcoded to "sieve" (using an intrusive list for O(1) efficiency).
# Note: Changing this value currently has no effect on the system logic.
policy="sieve"

#probationary pool config
# PROBATIONARY POOL SIZING LOGIC:
# This pool acts as the 'waiting room' for new keys. Size it based on the
# inverse of your workload's repeat-access rate.
#
# Logic:
# - If only 25% of keys are repeatedly used, set this to 75% (0.75).
# - This maximizes the 'window of opportunity' for new keys to prove
#   their worth before the Sequential Reaper evicts them.
# - High churn requires a larger probationary buffer to prevent
#   premature eviction of potentially useful data.
#
# Default value based on a 75% cold-traffic assumption:
probationary_pool_size=0.75

# SANCTUARY POOL MANAGEMENT (Soft Triggers)
# Controls proactive eviction to maintain a 'breathing buffer' for promoted keys.

# Threshold to start proactive eviction (e.g., 0.8 = 80% occupancy)
soft_trigger=0.8

# Target occupancy to reach before stopping proactive eviction.
soft_stop=0.7

# Max number of entries the 'Sequential Reaper' can evict in a single
# execution cycle. Note: The system yields between cycles to ensure
# the reactor is never stalled, maintaining high QPS and stable P99s.
soft_budget=500

# HARD TRIGGER CONFIG (Applied to the Probationary Pool)
# Defines aggressive eviction thresholds for the 'waiting room' to
# ensure immediate capacity for new incoming keys.

# Critical occupancy threshold (80%) that triggers immediate reclamation.
# Unlike soft triggers, this ensures the pool never hits 100% capacity.
hard_trigger=0.8

# The maximum number of 'one-hit' keys to be reaped per cycle.
# Note: To protect tail latency, the system explicitly yields between
# eviction cycles regardless of this budget. This prevents reactor
# stalls and ensures the application remains responsive during cleanup.
hard_budget=500

# Memory tuning
# Approximate value size in bytes to reserve per pooled entry. Together with
# key_reserve, this sets the per-entry size estimate used for pool sizing.
page_size_goal=7000

# Approximate key/metadata headroom in bytes to reserve per pooled entry.
# Added to page_size_goal for string reservation and pool memory estimation.
key_reserve=24

# Fraction of usable shard memory (0.0 to 1.0) that the pool may consume.
# Higher values increase preallocated pool capacity; lower values keep more
# memory free.
pool_max_memory_percent=0.8
